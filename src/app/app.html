<div class="contenedor">
  <h1>Gestión de Productos 🛒</h1>

  <div class="tarjeta">
    <h2>{{ editando ? 'Editar Producto' : 'Nuevo Producto' }}</h2>
    <form (ngSubmit)="guardarProducto()">
      
      <div class="campo">
        <label>Nombre:</label>
        <input type="text" name="nombre" [(ngModel)]="productoFormulario.nombre" required>
      </div>

      <div class="campo">
        <label>Precio ($):</label>
        <input type="number" name="precio" [(ngModel)]="productoFormulario.precio" required>
      </div>

      <div class="campo">
        <label>Cantidad:</label>
        <input type="number" name="cantidad" [(ngModel)]="productoFormulario.cantidad" required>
      </div>

      <button type="submit" class="btn-guardar">
        {{ editando ? 'Actualizar' : 'Guardar' }}
      </button>
      <button type="button" class="btn-cancelar" *ngIf="editando" (click)="limpiarFormulario()">
        Cancelar
      </button>
      
    </form>
  </div>

  <div class="tarjeta">
    <h2>Lista de Productos</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Precio</th>
          <th>Cantidad</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let prod of productos">
          <td>{{ prod.id }}</td>
          <td>{{ prod.nombre }}</td>
          <td>${{ prod.precio }}</td>
          <td>{{ prod.cantidad }}</td>
          <td>
            <button class="btn-editar" (click)="editarProducto(prod)">Editar</button>
            <button class="btn-eliminar" (click)="eliminarProducto(prod.id)">Eliminar</button>
          </td>
        </tr>
        <tr *ngIf="productos.length === 0">
          <td colspan="5" style="text-align: center;">No hay productos todavía.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
